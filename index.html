<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 30px 0;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            max-width: 500px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .present {
            background: linear-gradient(to right, #28c76f, #20c997);
            color: white;
        }
        .absent {
            background: linear-gradient(to right, #ea5455, #f56565);
            color: white;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            background: #f0f4ff;
            border-radius: 8px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
        }
        #presentCount {
            color: #28c76f;
        }
        #absentCount {
            color: #ea5455;
        }
        #searchInput {
            background-image: url('https://cdn-icons-png.flaticon.com/512/54/54481.png');
            background-size: 18px;
            background-repeat: no-repeat;
            background-position: 10px center;
            padding-left: 35px;
        }
        #record {
            margin-top: 20px;
            text-align: left;
        }
        #record h3 {
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-btn {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 5px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        strong {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📝 STUDENT ATTENDANCE</h2>

        <input type="text" id="idInput" placeholder="🏫 School ID">
        <input type="text" id="fnameInput" placeholder="👤 First Name">
        <input type="text" id="lnameInput" placeholder="👤 Last Name">

        <div class="btn-group">
            <button class="present" onclick="markPresent()">✅ PRESENT</button>
            <button class="absent" onclick="markAbsent()">❌ ABSENT</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <span id="presentCount">0</span>
                <small>Present</small>
            </div>
            <div class="stat-box">
                <span id="absentCount">0</span>
                <small>Absent</small>
            </div>
            <div class="stat-box">
                <span id="totalCount">0</span>
                <small>Total</small>
            </div>
        </div>

        <input type="text" id="searchInput" onkeyup="searchRecord()" placeholder="🔍 Search name or ID...">

        <div id="record">
            <h3>
                ATTENDANCE RECORD
                <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
            </h3>
            <ul id="list"></ul>
        </div>
    </div>

    <script>
        let present = 0;
        let absent = 0;

        function markPresent() {
            addRecord("PRESENT");
        }

        function markAbsent() {
            addRecord("ABSENT");
        }

        function addRecord(status) {
            let id = document.getElementById("idInput").value;
            let fname = document.getElementById("fnameInput").value;
            let lname = document.getElementById("lnameInput").value;

            if (id === "" || fname === "" || lname === "") {
                alert("⚠️ Please fill in all fields!");
                return;
            }

            let now = new Date();
            let date = now.toLocaleDateString();
            let time = now.toLocaleTimeString();

            let li = document.createElement("li");
            li.className = "list-item";
            li.innerHTML = 
                "<div>" +
                "<strong>ID:</strong> " + id + "<br>" +
                "<strong>Name:</strong> " + fname + " " + lname + "<br>" +
                "<strong>Status:</strong> " + status + " | " +
                "<strong>Date:</strong> " + date + " | " +
                "<strong>Time:</strong> " + time +
                "</div>" +
                "<button class='delete-btn' onclick='this.parentElement.remove(); updateCount();'>×</button>";
            
            if (status === "PRESENT") {
                li.style.borderLeftColor = "#28c76f";
                li.style.color = "#28c76f";
                present++;
            } else {
                li.style.borderLeftColor = "#ea5455";
                li.style.color = "#ea5455";
                absent++;
            }

            document.getElementById("list").appendChild(li);
            updateCount();

            document.getElementById("idInput").value = "";
            document.getElementById("fnameInput").value = "";
            document.getElementById("lnameInput").value = "";
        }

        function updateCount() {
            let total = document.querySelectorAll("#list li").length;
            document.getElementById("presentCount").innerText = present;
            document.getElementById("absentCount").innerText = absent;
            document.getElementById("totalCount").innerText = total;
        }

        function clearAll() {
            if(confirm("Are you sure you want to delete all records?")) {
                document.getElementById("list").innerHTML = "";
                present = 0;
                absent = 0;
                updateCount();
            }
        }

        function searchRecord() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let items = document.querySelectorAll(".list-item");

            items.forEach(function(item) {
                let text = item.textContent.toLowerCase();
                if(text.includes(input)) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>

</body>
</html>
