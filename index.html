<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            border: 1px solid #ccc;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            width: 250px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .present {
            background-color: green;
            color: white;
        }
        .absent {
            background-color: red;
            color: white;
        }
        #record {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ATTENDANCE SYSTEM</h2>
        <input type="text" id="nameInput" placeholder="Enter Student Name">
        <br>
        <button class="present" onclick="markPresent()">PRESENT</button>
        <button class="absent" onclick="markAbsent()">ABSENT</button>

        <div id="record">
            <h3>RECORD:</h3>
            <ul id="list"></ul>
        </div>
    </div>

    <script>
        function markPresent() {
            addRecord("PRESENT");
        }

        function markAbsent() {
            addRecord("ABSENT");
        }

        function addRecord(status) {
            let name = document.getElementById("nameInput").value;
            if (name === "") {
                alert("Please enter a name!");
                return;
            }
            
            let li = document.createElement("li");
            li.textContent = name + " - " + status;
            
            if (status === "PRESENT") {
                li.style.color = "green";
            } else {
                li.style.color = "red";
            }

            document.getElementById("list").appendChild(li);
            document.getElementById("nameInput").value = ""; // Clear input
        }
    </script>

</body>
</html>
